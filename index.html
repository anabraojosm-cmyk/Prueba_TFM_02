<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa-Museo Maravillas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="top-bar">
  <h1>Casa-Museo Maravillas</h1>
  <button id="menuBtn" class="menu-btn">☰</button>
  <div id="menuPanel" class="menu-panel">
    <a href="#">Visión Humedad Relativa HR%</a>
    <a href="#">Visión Temperatura Cº</a>
    <a href="#">Gráficas</a>
    <a href="#">Mapa Alerta de piezas</a>
    <a href="#">Selección por tipología</a>
  </div>
</header>

<section class="viewer-section">
  <div class="ambient-data">
    <span>18,7 Cº</span>
    <span>45 % HR</span>
    <span>86 lux</span>
  </div>
  
  <canvas id="threeCanvas"></canvas>

  <div class="controls">
    <button>+</button>
    <button>-</button>
    <button>☩</button>
    <button id="resetView">Reset</button>
  </div>
</section>

<section class="search-section">
  <button class="export-btn" id="exportBtn">Exportar datos</button>

  <div class="search-panel">
    <h2>Sala: Salón de estudio</h2>

    <div class="search-box">
      <input type="text" id="pieceCode" placeholder="Introduce el código">
      <button id="searchBtn">Buscar</button>
    </div>

    <div class="status-buttons">
      <button class="expo">Exposición</button>
      <button class="sust">Sustitución</button>
      <button class="ret">Retirada</button>
    </div>
  </div>

  <div class="piece-image" id="pieceImage">Imagen pieza</div>

  <div class="piece-info">
    <div>
      <p><strong>Nombre:</strong> <span id="nombre"></span></p>
      <p><strong>Autor:</strong> <span id="autor"></span></p>
      <p><strong>Datación:</strong> <span id="datacion"></span></p>
    </div>
    <div>
      <p><strong>Tipología:</strong> <span id="tipologia"></span></p>
      <p><strong>Materiales:</strong> <span id="materiales"></span></p>
      <p><strong>Dimensiones:</strong> <span id="dimensiones"></span></p>
    </div>
  </div>
</section>

<footer class="footer">© Ana Braojos Martorell</footer>

<script src="js/script.js"></script>
</body>
</html>
