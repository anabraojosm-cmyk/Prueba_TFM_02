<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Casa-Museo Maravillas</title>

    <!-- ✅ Enlace correcto al CSS -->
    <link rel="stylesheet"
<body>

    <!-- ================================
         ESPACIO 1 — CABECERA
    ================================= -->
    <div class="top-bar">
        Casa-Museo Maravillas

        <div class="menu-button" id="menuBtn">
            <div class="menu-line"></div>
            <div class="menu-line"></div>
            <div class="menu-line"></div>
        </div>

        <div class="menu-panel" id="menuPanel">
            <div>Visión Humedad Relativa HR%</div>
            <div>Visión Temperatura Cº</div>
            <div>Gráficas</div>
            <div>Mapa Alerta de piezas</div>
            <div>Selección por tipología</div>
        </div>
    </div>

    <!-- ================================
         ESPACIO 2 — MODELO 3D
    ================================= -->
    <div class="main">

        <!-- Datos flotantes -->
        <div style="
            position:absolute; 
            left:15px; 
            top:15px; 
            opacity:0.7;
            display:flex;
            flex-direction:column;
            gap:4px;">
            <span>18,7 Cº</span>
            <span>45% HR</span>
            <span>86 lux</span>
        </div>

        <!-- Canvas del modelo 3D -->
        <canvas id="threeCanvas"></canvas>

        <!-- Controles -->
        <div style="
            position:absolute; 
            right:20px; 
            top:20px; 
            display:flex; 
            flex-direction:column; 
            gap:10px;">
            <button class="button">+ ampliar</button>
            <button class="button">- alejar</button>
            <button class="button">☩ mover</button>
            <button class="button">resetear visión</button>
        </div>

    </div>

    <!-- ================================
         ESPACIO 3 — BUSCADOR
    ================================= -->
    <div class="bottom-bar">

        <h2>Sala: Salón de estudio</h2>

        <div class="bottom-content">

            <!-- Buscador -->
            <div>
                <input type="text" id="codigoInput" class="code-input" placeholder="Introduce el código">
                <button id="btnBuscar" class="button">Buscar</button>

                <div style="margin-top:10px; display:flex; gap:8px;">
                    <button class="button">Exposición</button>
                    <button class="button">Sustitución</button>
                    <button class="button">Retirada</button>
                </div>
            </div>

            <!-- Imagen -->
            <div class="object-viewer">
                <canvas id="objectCanvas"></canvas>
                <span class="viewer-placeholder">Imagen de la pieza</span>
            </div>

            <!-- Datos -->
            <div class="object-data">
                <div>
                    <div><strong>Nombre:</strong> <span id="nombre"></span></div>
                    <div><strong>Autor:</strong> <span id="autor"></span></div>
                    <div><strong>Datación:</strong> <span id="datacion"></span></div>
                </div>

                <div>
                    <div><strong>Tipología:</strong> <span id="tipologia"></span></div>
                    <div><strong>Materiales:</strong> <span id="materiales"></span></div>
                    <div><strong>Dimensiones:</strong> <span id="dimensiones"></span></div>
                </div>

                <button id="btnExportar" class="button" style="margin-left:20px;">Exportar datos</button>
            </div>

        </div>

    </div>

    <!-- ================================
         ESPACIO 4 — PIE DE PÁGINA
    ================================= -->
    <div class="footer">
        © Ana Braojos Martorell.
    </div>

    <!-- ✅ Cargar JS -->
    js/script.js</script>

</body>
</html>
